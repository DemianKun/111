<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KitchenOS | Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #cbd5e1; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex h-screen items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-orange-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="glass-card p-10 rounded-[2rem] w-full max-w-md shadow-2xl relative z-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic text-orange-500 tracking-tighter">K-OS</h1>
            <p class="text-[10px] uppercase font-bold text-slate-500 tracking-widest mt-2">Plataforma de Control Gastronómico</p>
        </div>

        <div id="form-login" class="space-y-6">
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Usuario</label>
                <input type="text" id="log-user" class="w-full bg-slate-900/80 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-orange-500 transition-colors">
            </div>
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Contraseña</label>
                <input type="password" id="log-pass" class="w-full bg-slate-900/80 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-orange-500 transition-colors">
            </div>
            <button onclick="login()" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-3 rounded-xl text-sm font-black tracking-widest transition-all shadow-lg">ENTRAR</button>
            <p class="text-center text-xs text-slate-500 mt-4">¿Eres nuevo en la cocina? <button onclick="toggleForms()" class="text-orange-400 font-bold hover:underline">Regístrate aquí</button></p>
        </div>

        <div id="form-register" class="space-y-6 hidden">
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Nuevo Usuario (Cocinero)</label>
                <input type="text" id="reg-user" placeholder="Ej. lalo_cocina" class="w-full bg-slate-900/80 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-orange-500 transition-colors">
            </div>
            <div>
                <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Crear Contraseña</label>
                <input type="password" id="reg-pass" class="w-full bg-slate-900/80 border border-white/10 rounded-xl p-3 text-white outline-none focus:border-orange-500 transition-colors">
            </div>
            <button onclick="registrar()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl text-sm font-black tracking-widest transition-all shadow-lg">CREAR CUENTA</button>
            <p class="text-center text-xs text-slate-500 mt-4">¿Ya tienes cuenta? <button onclick="toggleForms()" class="text-orange-400 font-bold hover:underline">Inicia sesión</button></p>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";

        // Alternar entre login y registro
        function toggleForms() {
            document.getElementById('form-login').classList.toggle('hidden');
            document.getElementById('form-register').classList.toggle('hidden');
        }

        async function login() {
            const u = document.getElementById('log-user').value;
            const p = document.getElementById('log-pass').value;
            
            const params = new URLSearchParams();
            params.append('username', u);
            params.append('password', p);

            try {
                const res = await fetch(`${API_URL}/token`, { method: 'POST', body: params });
                if(res.ok) {
                    const data = await res.json();
                    // Guardamos la sesión en el navegador
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('username', u);
                    localStorage.setItem('rol', data.rol);
                    localStorage.setItem('user_id', data.user_id);
                    
                    // Redirección inteligente dependiendo de quién entra
                    if(data.rol === 'chef') {
                        window.location.href = 'chef_panel.html';
                    } else {
                        window.location.href = 'cocinero_panel.html';
                    }
                } else {
                    alert('Usuario o contraseña incorrectos.');
                }
            } catch(e) { alert("Error de conexión al servidor."); }
        }

        async function registrar() {
            const u = document.getElementById('reg-user').value;
            const p = document.getElementById('reg-pass').value;

            if(!u || !p) { alert("Por favor, llena todos los campos."); return; }

            try {
                const res = await fetch(`${API_URL}/api/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if(res.ok) {
                    alert('✅ Cuenta de cocinero creada con éxito. Ahora por favor inicia sesión.');
                    toggleForms(); // Volvemos a la pantalla de login
                    document.getElementById('log-user').value = u; // Autocompletamos el usuario
                    document.getElementById('reg-user').value = '';
                    document.getElementById('reg-pass').value = '';
                } else {
                    const error = await res.json();
                    alert(error.detail || 'Error al crear el usuario. Posiblemente ya exista.');
                }
            } catch(e) { alert("Error de conexión al servidor."); }
        }
    </script>
</body>
</html>
